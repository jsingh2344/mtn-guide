databases:
  - name: mountain-guide-db
    plan: basic-256mb

services:
  - type: web
    name: mountain-guide
    runtime: python
    plan: starter
    buildCommand: bash build.sh
    preDeployCommand: python manage.py migrate --no-input
    startCommand: gunicorn summitguide.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: mountain-guide.onrender.com,guide.jadensingh.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://mountain-guide.onrender.com,https://guide.jadensingh.com
      - key: DATABASE_URL
        fromDatabase:
          name: mountain-guide-db
          property: connectionString
