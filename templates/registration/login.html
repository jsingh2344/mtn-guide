{% extends "base.html" %}

{% block title %}Log In - Wyoming Mountain Guide{% endblock %}

{% block content %}
<section class="narrow-panel">
  <h1>Log in</h1>
  <form method="post" class="stacked-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="primary-action" type="submit">Log in</button>
  </form>
</section>
{% endblock %}
